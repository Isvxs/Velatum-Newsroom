<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velatum Newsroom</title>
    <style>
        /* Load Fonts (Modify URL paths based on your actual assets) */
        @font-face {
            font-family: 'BuilderSans';
            src: url('BuilderSans-Medium-500.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'BuilderSans';
            src: url('BuilderSans-SemiBold-600.otf') format('opentype');
            font-weight: 600;
            font-style: normal;
        }

        /* Global Variables: Premium Minimalist Styling */
        :root {
            --bg-main: #ffffff;
            --text-main: #000000;
            --text-muted: #666666;
            --border-black: #000000;
            --border-muted: rgba(0, 0, 0, 0.1);
            --ease-premium: cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'BuilderSans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 500;
            margin: 0;
            padding: 40px 20px 60px 20px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Header */
        header {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
            margin: 0;
            cursor: pointer;
            transition: opacity 0.3s var(--ease-premium);
        }
        header h1:hover {
            opacity: 0.6;
        }

        /* Search Layout Container */
        .search-box {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .search-form {
            display: flex;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border-black);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.01);
            transition: box-shadow 0.3s var(--ease-premium);
        }
        .search-form:focus-within {
            box-shadow: 0 0 0 2px var(--border-black);
        }

        input[type="search"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
        }

        button {
            background-color: var(--border-black);
            color: var(--bg-main);
            border: none;
            padding: 0 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        button:hover {
            background-color: var(--bg-main);
            color: var(--border-black);
            box-shadow: inset 0 0 0 1px var(--border-black);
        }

        /* Core Layout Architecture */
        .main-layout {
            display: flex;
            width: 100%;
            max-width: 1000px;
            gap: 40px;
            flex-grow: 1;
        }

        main {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 30px;
            min-width: 0;
        }

        aside {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Interactive Post Cards */
        .post-card {
            background: rgba(0, 0, 0, 0.01);
            border: 1px solid var(--border-muted);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCard 0.6s var(--ease-premium) forwards;
            transition: transform 0.4s var(--ease-premium), 
                        border-color 0.4s var(--ease-premium), 
                        background-color 0.4s var(--ease-premium);
        }

        @keyframes fadeInCard {
            to { opacity: 1; transform: translateY(0); }
        }

        .post-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-black);
            background: rgba(0, 0, 0, 0.03);
        }

        .meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 14px 0;
            letter-spacing: -0.3px;
        }

        /* Content Masking Preview Layer */
        .content-preview {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.8);
            max-height: 120px;
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, #000000 50%, rgba(0, 0, 0, 0.3) 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, #000000 50%, rgba(0, 0, 0, 0.3) 80%, transparent 100%);
        }

        .content-preview img {
            display: none;
        }

        /* Right Navigation Index Tree */
        .sidebar-box {
            border: 1px solid var(--border-muted);
            border-radius: 12px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.005);
            position: sticky;
            top: 40px;
            box-sizing: border-box;
            width: 100%;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .toc-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toc-item {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInToc 0.5s var(--ease-premium) forwards;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            width: 100%;
            box-sizing: border-box;
            /* Added smooth transitions for 3D shifts */
            transition: opacity 0.3s var(--ease-premium), transform 0.3s var(--ease-premium);
        }
        
        @keyframes fadeInToc {
            to { opacity: 0.6; transform: translateY(0); }
        }

        /* Glides slightly forward with a 3D layer translation instead of snappy displacement */
        .toc-item:hover {
            opacity: 1 !important;
            transform: translate3d(6px, 0, 0) !important;
        }

        /* Universal System Status Bar */
        .footer-status-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 50px;
            border-top: 1px solid var(--border-muted);
            padding-top: 24px;
            text-align: center;
        }

        .footer-status {
            display: inline-block;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-main);
            background: linear-gradient(90deg, rgba(0,0,0,0) 25%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0) 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 2s infinite linear;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- Immersive View Overlay Modal --- */
        .modern-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-main);
            z-index: 9999;
            box-sizing: border-box;
            padding: 80px 20px;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(20px) scale(0.99);
            transition: transform 0.4s var(--ease-premium), opacity 0.4s var(--ease-premium);
        }
        
        .modern-modal.open {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .modal-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .close-btn {
            position: fixed;
            top: 40px;
            right: 40px;
            background: transparent;
            border: 1px solid var(--border-black);
            color: var(--text-main);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s var(--ease-premium);
            z-index: 10000;
        }
        .close-btn:hover {
            background: var(--border-black);
            color: var(--bg-main);
            transform: rotate(90deg);
        }

        .modal-body .full-content {
            display: block;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.8;
            -webkit-mask-image: none !important;
            mask-image: none !important;
            max-height: none !important;
            overflow: visible !important;
        }

        .modal-body .full-content img {
            display: block;
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-muted);
            border-radius: 8px;
            margin: 24px 0;
        }

        .modal-body h1 {
            font-size: 30px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 20px 0;
            line-height: 1.3;
        }

        /* Mobile Fluid Breakpoints */
        @media(max-width:768px){
            .main-layout { flex-direction: column; gap: 30px; }
            aside { display: none; } 
            .close-btn { top: 20px; right: 20px; width: 36px; height: 36px; font-size: 14px; }
            body { padding-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">Velatum Newsroom</h1>
    </header>

    <div class="search-box">
        <div class="search-form">
            <input type="search" id="S" placeholder="Search tokens or categories...">
            <button id="BtnS">Search</button>
        </div>
    </div>

    <div class="main-layout">
        <main id="C"></main>
        
        <aside>
            <div class="sidebar-box">
                <div class="sidebar-title">Index Tree</div>
                <div id="T" class="toc-list"></div>
            </div>
        </aside>
    </div>

    <div class="footer-status-container">
        <div id="L" class="footer-status">SYNCING ENVIRONMENT...</div>
    </div>

    <div id="win-modal" class="modern-modal">
        <button class="close-btn" onclick="closePost()">✕</button>
        <div class="modal-container">
            <div id="win-body-content" class="modal-body"></div>
        </div>
    </div>

    <script>
        // Target Routing configured for Isvxs/Velatum-Newsroom
        const C={U:'Isvxs',R:'Velatum-Newsroom',B:'main',S:5},db={a:[],f:[],p:0,b:!1};
        const $=(id)=>document.getElementById(id),cnt=$('C'),lod=$('L'),toc=$('T');

        // Initialization and Environment Integrity Controls
        async function init(){
            try {
                const statusRes = await fetch('status.json?t=' + Date.now());
                if (statusRes.ok) {
                    const statusData = await statusRes.json();
                    if (statusData.isFixing) {
                        lod.innerText = "REDIRECTING TO MAINTENANCE...";
                        document.querySelector('header h1').innerText = "SYSTEM MAINTENANCE";
                        document.querySelector('.main-layout').style.opacity = '0';
                        document.querySelector('.main-layout').style.transition = 'opacity 0.4s ease';
                        
                        setTimeout(() => {
                            window.location.href = 'fixing.html';
                        }, 1200);
                        return; 
                    }
                }
            } catch(e) {
                console.log("Status validation check bypassed.");
            }

            try{
                lod.innerText="CONNECTING SERVER...";
                const r=await(await fetch(`https://api.github.com/repos/${C.U}/${C.R}/git/trees/${C.B}?recursive=1`)).json();
                
                // Filtering files originating strictly from the 'posts/' manifest directory
                db.a=r.tree.filter(i=>i.path.startsWith('posts/')&&i.path.endsWith('.json'))
                    .map(i=>({s:i.sha,n:i.path.split('/').pop(),u:`https://cdn.jsdelivr.net/gh/${C.U}/${C.R}@${C.B}/${i.path}`})).reverse();
                
                db.f=[...db.a];
                load();
            }catch(e){
                lod.innerText="CORE_ERROR: CONNECTION FAILED"; 
                lod.style.color="#ff0000";
            }
            window.onscroll=()=>{if(innerHeight+scrollY>=document.body.offsetHeight-400)load()};
        }

        // Lazy Loading Chunk Engines
        async function load(){
            if(db.b||db.p>=db.f.length)return;
            db.b=!0;
            lod.innerText="FETCHING DATA PACKETS...";
            
            let cardDelay = 0;

            for(const f of db.f.slice(db.p,db.p+C.S)){
                try{
                    let p=JSON.parse(localStorage.getItem(f.s));
                    if(!p){p=await(await fetch(f.u)).json();localStorage.setItem(f.s,JSON.stringify(p))}
                    
                    const a=document.createElement('article');
                    a.className='post-card';
                    a.style.animationDelay = `${cardDelay}s`;
                    a.onclick = () => openPost(p);

                    a.innerHTML=`<div class="meta">${p.category||'GENERAL'} // ${p.date}</div>
                                 <h2>${p.title}</h2>
                                 <div class="content-preview">${p.content}</div>`;
                    cnt.appendChild(a);
                    
                    // Render dynamic right side link nodes
                    const t=document.createElement('a');
                    t.className='toc-item';
                    t.innerText=p.title;
                    t.href="#";
                    t.style.animationDelay = `${cardDelay}s`;
                    
                    t.onclick=(e)=>{
                        e.preventDefault(); 
                        e.stopPropagation(); 
                        a.scrollIntoView({behavior:'smooth'});
                    };
                    toc.appendChild(t);

                    cardDelay += 0.06;
                }catch(e){}
            }
            db.p+=C.S;db.b=!1;
            lod.innerText=db.p>=db.f.length?"EOF // LOG ENDED":"SCROLL FOR MORE LOGS";
        }

        // Search Index Engine Filters
        const doSearch=()=>{
            cnt.innerHTML=toc.innerHTML='';db.p=0;
            const v=$('S').value.toLowerCase().trim();
            db.f=db.a.filter(f=>{
                const c=localStorage.getItem(f.s);
                if(c){
                    const p=JSON.parse(c);
                    return p.title.toLowerCase().includes(v) || (p.category && p.category.toLowerCase().includes(v));
                }
                return f.n.toLowerCase().includes(v);
            });
            load();
        };

        // --- Immersive Modal Handlers ---
        function openPost(postData) {
            const modal = $('win-modal');
            $('win-body-content').innerHTML = `
                <div class="meta" style="margin-bottom: 30px; border-bottom: 1px solid var(--border-muted); padding-bottom: 15px;">
                    ${postData.category || 'GENERAL'} // TIMESTAMP: ${postData.date}
                </div>
                <h1>${postData.title}</h1>
                <div class="full-content">
                    ${postData.content}
                </div>
            `;
            
            modal.style.display = 'block';
            modal.offsetHeight; 
            modal.classList.add('open');
            document.body.style.overflow = 'hidden'; 
        }

        function closePost() {
            const modal = $('win-modal');
            modal.classList.remove('open');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 400); 
            document.body.style.overflow = ''; 
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePost();
        });

        $('BtnS').onclick=doSearch;
        $('S').onkeypress=(e)=>{if(e.which===13)doSearch();};

        init();
    </script>
</body>
</html>
